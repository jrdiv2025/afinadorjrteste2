<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="theme-color" content="#0a0a14"/>
  
  <!-- 🔹 PWA Meta Tags -->
  <meta name="application-name" content="AfinadorJR">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="AfinadorJR">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="description" content="Afinador de violão profissional com detecção automática de notas via microfone">
  
  <!-- 🔹 Manifest Link (ícones na raiz) -->
  <link rel="manifest" href="/afinadorjrteste/manifest.json">
  
  <!-- 🔹 Ícones para iOS -->
  <link rel="apple-touch-icon" sizes="192x192" href="/afinadorjrteste/icon-192x192.png">
  <link rel="apple-touch-icon" sizes="512x512" href="/afinadorjrteste/icon-512x512.png">
  
  <title>Afinador de Violão</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&family=Teko:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    html, body, #app {
      -webkit-user-select: none;
      -moz-user-select: none;
      -ms-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
    }

    :root {
      --bg: #0a0a14;
      --surface: #111122;
      --surface2: #161628;
      --border: rgba(255,255,255,0.06);
      --gold: #c9a84c;
      --gold-light: #e8c87a;
      --gold-dim: rgba(201,168,76,0.15);
      --green: #2deb8f;
      --green-glow: rgba(45,235,143,0.3);
      --blue: #5ba4f5;
      --blue-glow: rgba(91,164,245,0.3);
      --red: #f55b5b;
      --red-glow: rgba(245,91,91,0.3);      --text: #e8e8f0;
      --muted: #6b6b8a;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Space Mono', monospace;
      overflow-x: hidden;
    }

    body {
      background-image:
        radial-gradient(ellipse 80% 50% at 50% -10%, rgba(201,168,76,0.08) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 80%, rgba(45,235,143,0.04) 0%, transparent 50%);
      min-height: 100dvh;
    }

    /* ── LAYOUT ── */
    #app {
      max-width: 430px;
      margin: 0 auto;
      padding: 0 16px 32px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      min-height: 100dvh;
    }

    /* ── HEADER ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 0 4px;
    }

    .logo {
      display: flex;
      align-items: baseline;
      gap: 8px;
    }

    .logo-title {
      font-family: 'Bebas Neue', cursive;
      font-size: 2.4rem;
      letter-spacing: 0.08em;
      color: var(--gold-light);
      line-height: 1;    }

    .logo-sub {
      font-family: 'Teko', sans-serif;
      font-size: 0.85rem;
      font-weight: 300;
      color: var(--muted);
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    /* ── MIC BUTTON ── */
    #mic-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 18px;
      border-radius: 50px;
      border: 1px solid rgba(45,235,143,0.25);
      background: rgba(45,235,143,0.05);
      cursor: pointer;
      transition: all 200ms ease;
      touch-action: manipulation;
      user-select: none;
    }

    #mic-btn:active { transform: scale(0.95); }

    #mic-btn.active {
      border-color: rgba(45,235,143,0.6);
      background: rgba(45,235,143,0.12);
      box-shadow: 0 0 20px var(--green-glow);
    }

    #mic-label {
      font-family: 'Teko', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      color: var(--green);
    }

    .mic-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--muted);
    }

    .mic-dot.off { background: #f55b5b; animation: pulse-red 1.5s infinite; }    .mic-dot.on  { background: var(--green); animation: pulse-green 0.8s infinite; }

    @keyframes pulse-red   { 0%,100%{opacity:1} 50%{opacity:0.3} }
    @keyframes pulse-green { 0%,100%{opacity:1} 50%{opacity:0.5} }

    /* ── MAIN DISPLAY ── */
    .main-display {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 24px 20px 20px;
      position: relative;
      overflow: hidden;
    }

    .main-display::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      opacity: 0.4;
    }

    .display-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .detected-label {
      font-family: 'Teko', sans-serif;
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      color: var(--muted);
      text-transform: uppercase;
    }

    #detected-note {
      font-family: 'Bebas Neue', cursive;
      font-size: 5rem;
      line-height: 0.9;
      color: var(--gold-light);
      transition: color 200ms;
    }

    .target-block {
      text-align: right;
    }
    .target-label {
      font-family: 'Teko', sans-serif;
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      color: var(--muted);
      text-transform: uppercase;
    }

    #target-note {
      font-family: 'Bebas Neue', cursive;
      font-size: 2.8rem;
      line-height: 0.9;
      color: var(--text);
      transition: all 300ms ease;
    }

    #target-sub {
      font-family: 'Teko', sans-serif;
      font-size: 0.85rem;
      color: var(--muted);
      letter-spacing: 0.05em;
    }

    /* ── CENTS STRIP ── */
    .cents-bar-wrap {
      margin: 8px 0 12px;
    }

    .cents-bar-labels {
      display: flex;
      justify-content: space-between;
      font-size: 0.6rem;
      color: var(--muted);
      margin-bottom: 4px;
      letter-spacing: 0.05em;
    }

    .cents-bar-track {
      height: 6px;
      background: var(--surface2);
      border-radius: 10px;
      position: relative;
      overflow: visible;
    }

    .cents-bar-center {
      position: absolute;
      left: 50%;
      top: -3px;      bottom: -3px;
      width: 2px;
      transform: translateX(-50%);
      background: rgba(255,255,255,0.15);
      border-radius: 2px;
    }

    #cents-fill {
      position: absolute;
      top: 0; bottom: 0;
      left: 50%;
      width: 0;
      transition: width 200ms ease, left 200ms ease, background 300ms;
      border-radius: 10px;
    }

    #cents-needle {
      position: absolute;
      top: -6px;
      width: 3px;
      height: 18px;
      background: white;
      border-radius: 3px;
      box-shadow: 0 0 8px rgba(255,255,255,0.8);
      transform: translateX(-50%);
      left: 50%;
      transition: left 200ms cubic-bezier(0.25,0.8,0.25,1);
    }

    /* ── STATUS ROW ── */
    .status-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 8px;
    }

    #cents-value {
      font-family: 'Space Mono', monospace;
      font-size: 0.85rem;
      color: var(--muted);
      transition: color 300ms;
    }

    #status-text {
      font-family: 'Teko', sans-serif;
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      color: var(--muted);      transition: color 300ms, text-shadow 300ms;
    }

    #status-text.tuned   { color: var(--green);  text-shadow: 0 0 20px var(--green-glow); }
    #status-text.flat    { color: var(--blue);   text-shadow: 0 0 20px var(--blue-glow);  }
    #status-text.sharp   { color: var(--red);    text-shadow: 0 0 20px var(--red-glow);   }

    /* ── BIG DIRECTION ── */
    .direction-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 90px;
      position: relative;
    }

    #direction-arrow {
      font-family: 'Bebas Neue', cursive;
      font-size: 3.5rem;
      letter-spacing: 0.05em;
      opacity: 0;
      transform: scale(0.8);
      transition: all 300ms cubic-bezier(0.34,1.56,0.64,1);
    }

    #direction-arrow.visible {
      opacity: 1;
      transform: scale(1);
    }

    #direction-arrow.tuned { color: var(--green);  text-shadow: 0 0 40px var(--green-glow); }
    #direction-arrow.flat  { color: var(--blue);   text-shadow: 0 0 40px var(--blue-glow);  }
    #direction-arrow.sharp { color: var(--red);    text-shadow: 0 0 40px var(--red-glow);   }

    .idle-msg {
      font-family: 'Teko', sans-serif;
      font-size: 1rem;
      letter-spacing: 0.1em;
      color: var(--muted);
      text-align: center;
      position: absolute;
    }

    /* ── TUNING ACCURACY RING ── */
    .accuracy-ring-wrap {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 4px 0 0;
    }
    .accuracy-ring {
      width: 56px;
      height: 56px;
    }

    .accuracy-ring circle.bg   { fill: none; stroke: var(--surface2); stroke-width: 5; }
    .accuracy-ring circle.fill {
      fill: none;
      stroke: var(--green);
      stroke-width: 5;
      stroke-linecap: round;
      stroke-dasharray: 138;
      stroke-dashoffset: 138;
      transform-origin: center;
      transform: rotate(-90deg);
      transition: stroke-dashoffset 300ms ease, stroke 300ms;
    }

    /* ── STRING BUTTONS ── */
    .strings-header {
      font-family: 'Teko', sans-serif;
      font-size: 0.7rem;
      font-weight: 300;
      letter-spacing: 0.2em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .strings-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .string-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px 8px 12px;
      cursor: pointer;
      transition: all 180ms ease;
      touch-action: manipulation;
      user-select: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }
    .string-btn:active { transform: scale(0.94); }

    .string-btn.playing {
      border-color: var(--gold);
      background: var(--gold-dim);
      box-shadow: 0 0 16px rgba(201,168,76,0.2);
    }

    .string-btn.active-detect {
      border-color: rgba(45,235,143,0.5);
      background: rgba(45,235,143,0.06);
    }

    .stn-icon {
      font-size: 1.4rem;
      line-height: 1;
      transition: transform 200ms;
    }

    .string-btn.playing .stn-icon { transform: scale(1.15); }

    .stn-note {
      font-family: 'Bebas Neue', cursive;
      font-size: 1.8rem;
      line-height: 1;
      color: var(--text);
    }

    .stn-id {
      font-family: 'Teko', sans-serif;
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      color: var(--muted);
      text-transform: uppercase;
    }

    /* ── FOOTER ── */
    footer {
      padding: 8px 0 4px;
      text-align: center;
    }

    footer p {
      font-family: 'Teko', sans-serif;
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      color: var(--muted);
      opacity: 0.6;
    }
    /* ── ACTIVE STRING HIGHLIGHT ── */
    @keyframes detectPulse {
      0%,100% { box-shadow: 0 0 0 0 rgba(45,235,143,0.3); }
      50%      { box-shadow: 0 0 0 6px rgba(45,235,143,0); }
    }

    .string-btn.active-detect {
      animation: detectPulse 1.2s infinite;
    }

    /* ── SAFE AREA ── */
    @supports (padding-bottom: env(safe-area-inset-bottom)) {
      #app { padding-bottom: calc(32px + env(safe-area-inset-bottom)); }
    }
  </style>
</head>
<body>
  <div id="app">

    <!-- HEADER -->
    <header>
      <div>
        <div class="logo">
          <span class="logo-title">AFINADOR</span>
        </div>
        <div class="logo-sub">Violão • Auto-detect</div>
      </div>

      <button id="mic-btn" onclick="toggleMic()">
        <span id="mic-label">INICIAR</span>
        <div id="mic-dot" class="mic-dot off"></div>
      </button>
    </header>

    <!-- MAIN DISPLAY -->
    <div class="main-display">
      <div class="display-top">
        <!-- Detected -->
        <div>
          <div class="detected-label">Detectada</div>
          <div id="detected-note">—</div>
        </div>

        <!-- Accuracy ring (center) -->
        <div class="accuracy-ring-wrap">
          <svg class="accuracy-ring" viewBox="0 0 48 48">
            <circle class="bg"   cx="24" cy="24" r="22"/>
            <circle id="acc-circle" class="fill" cx="24" cy="24" r="22"/>
          </svg>        </div>

        <!-- Target -->
        <div class="target-block">
          <div class="target-label">Alvo</div>
          <div id="target-note">—</div>
          <div id="target-sub">—</div>
        </div>
      </div>

      <!-- CENTS BAR -->
      <div class="cents-bar-wrap">
        <div class="cents-bar-labels">
          <span>♭ Bemol</span>
          <span>CENTRO</span>
          <span>Sustenido ♯</span>
        </div>
        <div class="cents-bar-track">
          <div class="cents-bar-center"></div>
          <div id="cents-fill"></div>
          <div id="cents-needle"></div>
        </div>
      </div>

      <!-- STATUS ROW -->
      <div class="status-row">
        <div id="cents-value">0 cents</div>
        <div id="status-text">—</div>
      </div>

      <!-- DIRECTION -->
      <div class="direction-wrap">
        <div class="idle-msg" id="idle-msg">Toque uma corda...</div>
        <div id="direction-arrow"></div>
      </div>
    </div>

    <!-- STRING REFERENCE BUTTONS -->
    <div>
      <div class="strings-header">Tons de referência</div>
      <div class="strings-grid" id="strings-grid"></div>
    </div>

    <footer>
      <p>Toque forte e limpo • Aproxime o violão do microfone</p>
    </footer>

  </div>

  <script>    // ── STRINGS CONFIG ──
    const STRINGS = [
      { id:6, nota:'E', freq:82.41,  label:'6ª Mi grave' },
      { id:5, nota:'A', freq:110.00, label:'5ª Lá'       },
      { id:4, nota:'D', freq:146.83, label:'4ª Ré'       },
      { id:3, nota:'G', freq:196.00, label:'3ª Sol'      },
      { id:2, nota:'B', freq:246.94, label:'2ª Si'       },
      { id:1, nota:'E', freq:329.63, label:'1ª Mi agudo' },
    ];

    // ── STATE ──
    let audioCtx = null, analyser = null, stream = null;
    let isListening = false, rafId = null, lastFreq = 0, lastCordaId = null;
    let currentOsc = null, playingIdx = -1;

    // ── DOM REFS ──
    const $ = id => document.getElementById(id);
    const el = {
      micBtn:     $('mic-btn'),
      micLabel:   $('mic-label'),
      micDot:     $('mic-dot'),
      detNote:    $('detected-note'),
      targetNote: $('target-note'),
      targetSub:  $('target-sub'),
      centsFill:  $('cents-fill'),
      centsNeedle:$('cents-needle'),
      centsVal:   $('cents-value'),
      statusTxt:  $('status-text'),
      dirArrow:   $('direction-arrow'),
      idleMsg:    $('idle-msg'),
      accCircle:  $('acc-circle'),
      grid:       $('strings-grid'),
    };

    // ── PITCH DETECTION (normalized autocorrelation) ──
    function detectPitch(buf, sr) {
      const SIZE = buf.length;
      let rms = 0;
      for (let i = 0; i < SIZE; i++) rms += buf[i] * buf[i];
      rms = Math.sqrt(rms / SIZE);
      if (rms < 0.008) return -1;

      const minLag = Math.floor(sr / 420);
      const maxLag = Math.floor(sr / 65);
      let bestLag = -1, bestCorr = 0;
      const corrs = new Array(maxLag + 1).fill(0);

      for (let lag = minLag; lag <= maxLag && lag < SIZE / 2; lag++) {
        let corr = 0, energy = 0;
        const len = SIZE - lag;        for (let i = 0; i < len; i++) {
          corr   += buf[i] * buf[i + lag];
          energy += buf[i] * buf[i] + buf[i + lag] * buf[i + lag];
        }
        corr /= Math.sqrt(energy) || 1;
        corrs[lag] = corr;
        if (corr > bestCorr) { bestCorr = corr; bestLag = lag; }
      }

      if (bestCorr < 0.28 || bestLag < 0) return -1;

      let lag = bestLag;
      if (bestLag > minLag && bestLag < maxLag) {
        const a = corrs[bestLag - 1] || 0;
        const b = corrs[bestLag];
        const c = corrs[bestLag + 1] || 0;
        const delta = 0.5 * (a - c) / (a - 2*b + c + 1e-10);
        lag = bestLag + delta;
      }
      return sr / lag;
    }

    function centsDiff(detected, target) {
      if (!detected || detected < 60) return 0;
      return Math.round(1200 * Math.log2(detected / target));
    }

    function noteFromFreq(freq) {
      if (freq < 60) return '—';
      const midi  = 12 * Math.log2(freq / 440) + 69;
      const round = Math.round(midi);
      const notes = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
      return notes[round % 12] + (Math.floor(round / 12) - 1);
    }

    function findClosest(freq) {
      if (freq < 60) return null;
      let closest = null, minC = Infinity;
      STRINGS.forEach(s => {
        const c = Math.abs(1200 * Math.log2(freq / s.freq));
        if (c < minC) { minC = c; closest = s; }
      });
      return minC < 80 ? closest : null;
    }

    // ── UPDATE UI ──
    function updateUI(freq) {
      const closest = findClosest(freq);
      if (!closest) return;
      const cents = centsDiff(freq, closest.freq);
      const nota  = noteFromFreq(freq);
      const pct   = Math.max(0, 100 - Math.abs(cents));

      el.detNote.textContent = nota;

      if (closest.id !== lastCordaId) {
        el.targetNote.style.opacity = '0';
        el.targetSub.style.opacity  = '0';
        setTimeout(() => {
          el.targetNote.textContent = closest.nota;
          el.targetSub.textContent  = closest.label;
          el.targetNote.style.opacity = '1';
          el.targetSub.style.opacity  = '1';
        }, 150);
        lastCordaId = closest.id;
        document.querySelectorAll('.string-btn').forEach((b, i) => {
          b.classList.toggle('active-detect', STRINGS[i].id === closest.id);
        });
      }

      const needlePct = 50 + (cents / 100) * 50;
      const clampedPct = Math.max(2, Math.min(98, needlePct));
      el.centsNeedle.style.left = clampedPct + '%';

      if (cents < 0) {
        const w = Math.min(50, Math.abs(cents / 100) * 50);
        el.centsFill.style.left  = (50 - w) + '%';
        el.centsFill.style.width = w + '%';
        el.centsFill.style.background = 'var(--blue)';
      } else if (cents > 0) {
        const w = Math.min(50, (cents / 100) * 50);
        el.centsFill.style.left  = '50%';
        el.centsFill.style.width = w + '%';
        el.centsFill.style.background = 'var(--red)';
      } else {
        el.centsFill.style.width = '0';
      }

      el.centsVal.textContent = (cents >= 0 ? '+' : '') + cents + ' cents';

      const circumference = 138;
      const offset = circumference - (pct / 100) * circumference;
      el.accCircle.style.strokeDashoffset = offset;

      el.idleMsg.style.opacity = '0';
      el.dirArrow.classList.add('visible');

      if (Math.abs(cents) <= 8) {
        el.dirArrow.textContent  = '✓ AFINADO';        el.dirArrow.className    = 'visible tuned';
        el.statusTxt.textContent = 'Perfeito!';
        el.statusTxt.className   = 'tuned';
        el.accCircle.style.stroke = 'var(--green)';
        el.centsVal.style.color   = 'var(--green)';
      } else if (cents < -8) {
        el.dirArrow.textContent  = '↑ SUBIR';
        el.dirArrow.className    = 'visible flat';
        el.statusTxt.textContent = 'Aperte a tarraxa';
        el.statusTxt.className   = 'flat';
        el.accCircle.style.stroke = 'var(--blue)';
        el.centsVal.style.color   = 'var(--blue)';
      } else {
        el.dirArrow.textContent  = '↓ DESCER';
        el.dirArrow.className    = 'visible sharp';
        el.statusTxt.textContent = 'Afrouxe a tarraxa';
        el.statusTxt.className   = 'sharp';
        el.accCircle.style.stroke = 'var(--red)';
        el.centsVal.style.color   = 'var(--red)';
      }
    }

    function resetDisplay() {
      el.detNote.textContent    = '—';
      el.targetNote.textContent = '—';
      el.targetSub.textContent  = '—';
      el.centsVal.textContent   = '0 cents';
      el.centsVal.style.color   = '';
      el.centsFill.style.width  = '0';
      el.centsNeedle.style.left = '50%';
      el.statusTxt.textContent  = '—';
      el.statusTxt.className    = '';
      el.dirArrow.className     = '';
      el.dirArrow.textContent   = '';
      el.idleMsg.style.opacity  = '1';
      el.accCircle.style.strokeDashoffset = '138';
      el.accCircle.style.stroke = 'var(--green)';
      lastCordaId = null;
      document.querySelectorAll('.string-btn').forEach(b => b.classList.remove('active-detect'));
    }

    // ── PITCH LOOP ──
    function updatePitch() {
      if (!isListening || !analyser) { rafId = requestAnimationFrame(updatePitch); return; }

      const buf = new Float32Array(analyser.fftSize);
      analyser.getFloatTimeDomainData(buf);

      const freq = detectPitch(buf, audioCtx.sampleRate);
      if (freq > 65 && freq < 420) {
        lastFreq = lastFreq * 0.6 + freq * 0.4;
        updateUI(lastFreq);
      }

      rafId = requestAnimationFrame(updatePitch);
    }

    // ── MICROPHONE ──
    async function startListening() {
      try {
        if (!window.isSecureContext) return alert('Use HTTPS para acessar o microfone.');

        stream = await navigator.mediaDevices.getUserMedia({
          audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false }
        });

        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') await audioCtx.resume();

        const source = audioCtx.createMediaStreamSource(stream);
        analyser = audioCtx.createAnalyser();
        analyser.fftSize = 8192;
        analyser.minDecibels = -90;
        source.connect(analyser);

        isListening = true;
        lastFreq = 0;
        lastCordaId = null;

        el.micBtn.classList.add('active');
        el.micLabel.textContent = 'OUVINDO';
        el.micDot.className = 'mic-dot on';

        updatePitch();
      } catch (err) {
        alert('Erro ao acessar microfone: ' + err.message);
      }
    }

    function stopListening() {
      if (stream)  stream.getTracks().forEach(t => t.stop());
      if (rafId)   cancelAnimationFrame(rafId);
      isListening = false;

      el.micBtn.classList.remove('active');
      el.micLabel.textContent = 'INICIAR';
      el.micDot.className = 'mic-dot off';

      resetDisplay();    }

    function toggleMic() {
      isListening ? stopListening() : startListening();
    }

    // ── REFERENCE TONES ──
    function playTone(idx) {
      stopTone();
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();

      const osc  = audioCtx.createOscillator();
      const gain = audioCtx.createGain();

      osc.type = 'triangle';
      osc.frequency.value = STRINGS[idx].freq;
      gain.gain.value = 0;
      gain.gain.linearRampToValueAtTime(0.3, audioCtx.currentTime + 0.05);

      osc.connect(gain).connect(audioCtx.destination);
      osc.start();

      currentOsc  = { osc, gain };
      playingIdx  = idx;

      document.querySelectorAll('.string-btn').forEach((b, i) => {
        b.classList.toggle('playing', i === idx);
        b.querySelector('.stn-icon').textContent = (i === idx) ? '⏹' : '♪';
      });
    }

    function stopTone() {
      if (!currentOsc) return;
      const { osc, gain } = currentOsc;
      gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.05);
      setTimeout(() => osc.stop(), 60);
      currentOsc = null;
      playingIdx = -1;

      document.querySelectorAll('.string-btn').forEach(b => {
        b.classList.remove('playing');
        b.querySelector('.stn-icon').textContent = '♪';
      });
    }

    // ── BUILD STRING BUTTONS ──
    function buildButtons() {
      el.grid.innerHTML = '';
      STRINGS.forEach((s, i) => {
        const btn = document.createElement('button');        btn.className = 'string-btn';
        btn.innerHTML = `
          <span class="stn-icon">♪</span>
          <span class="stn-note">${s.nota}</span>
          <span class="stn-id">${s.label}</span>
        `;
        btn.onclick = () => (playingIdx === i) ? stopTone() : playTone(i);
        el.grid.appendChild(btn);
      });
    }

    // ── INIT ──
    window.addEventListener('load', () => {
      buildButtons();
      resetDisplay();
      
      // 🔹 Register Service Worker (obrigatório para Android APK)
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/afinadorjrteste/sw.js')
          .then(reg => console.log('SW registrado:', reg.scope))
          .catch(err => console.log('SW falhou:', err));
      }
    });

    // Disable long-press context menu
    document.addEventListener('contextmenu', e => e.preventDefault());
    document.addEventListener('selectstart', e => e.preventDefault());
  </script>
</body>
</html>
